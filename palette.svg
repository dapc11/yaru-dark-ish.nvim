<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340">
  <style>
    text { font-family: monospace; font-size: 12px; }
    .label { fill: #C0BFBC; }
    .hex { fill: #9A9996; }
  </style>
  <rect width="720" height="340" rx="8" fill="#1E1E1E"/>
  <text x="20" y="28" fill="#C0BFBC" font-size="16" font-weight="bold">yaru-dark-ish palette</text>

  <!-- Row 1: Backgrounds & Surfaces -->
  <rect x="20"  y="50" width="80" height="40" rx="4" fill="#181818"/><text class="label" x="24" y="78">darker</text><text class="hex" x="24" y="102">#181818</text>
  <rect x="110" y="50" width="80" height="40" rx="4" fill="#1E1E1E" stroke="#3D3846" stroke-width="1"/><text class="label" x="114" y="78">darkbg</text><text class="hex" x="114" y="102">#1E1E1E</text>
  <rect x="200" y="50" width="80" height="40" rx="4" fill="#262626" stroke="#3D3846" stroke-width="1"/><text class="label" x="204" y="78">bg</text><text class="hex" x="204" y="102">#262626</text>
  <rect x="290" y="50" width="80" height="40" rx="4" fill="#2A2A2A"/><text class="label" x="294" y="78">surface0</text><text class="hex" x="294" y="102">#2A2A2A</text>
  <rect x="380" y="50" width="80" height="40" rx="4" fill="#303030"/><text class="label" x="384" y="78">surface1</text><text class="hex" x="384" y="102">#303030</text>
  <rect x="470" y="50" width="80" height="40" rx="4" fill="#3D3846"/><text class="label" x="474" y="78">surface2</text><text class="hex" x="474" y="102">#3D3846</text>
  <rect x="560" y="50" width="80" height="40" rx="4" fill="#504E55"/><text class="label" x="564" y="78">gray</text><text class="hex" x="564" y="102">#504E55</text>

  <!-- Row 2: Text -->
  <rect x="20"  y="120" width="80" height="40" rx="4" fill="#5E5C64"/><text class="label" x="24" y="148">brblack</text><text class="hex" x="24" y="172">#5E5C64</text>
  <rect x="110" y="120" width="80" height="40" rx="4" fill="#9A9996"/><text class="label" x="114" y="148">subtext0</text><text class="hex" x="114" y="172">#9A9996</text>
  <rect x="200" y="120" width="80" height="40" rx="4" fill="#B0AFAC"/><text class="label" x="204" y="148">subtext1</text><text class="hex" x="204" y="172">#B0AFAC</text>
  <rect x="290" y="120" width="80" height="40" rx="4" fill="#C0BFBC"/><text class="label" x="294" y="148">fg</text><text class="hex" x="294" y="172">#C0BFBC</text>
  <rect x="380" y="120" width="80" height="40" rx="4" fill="#FFFFFF"/><text class="label" x="384" y="148">brwhite</text><text class="hex" x="384" y="172">#FFFFFF</text>

  <!-- Row 3: Colors -->
  <rect x="20"  y="190" width="80" height="40" rx="4" fill="#EA485C"/><text class="label" x="24" y="218">red</text><text class="hex" x="24" y="242">#EA485C</text>
  <rect x="110" y="190" width="80" height="40" rx="4" fill="#FF87AF"/><text class="label" x="114" y="218">brred</text><text class="hex" x="114" y="242">#FF87AF</text>
  <rect x="200" y="190" width="80" height="40" rx="4" fill="#E95420"/><text class="label" x="204" y="218">orange</text><text class="hex" x="204" y="242">#E95420</text>
  <rect x="290" y="190" width="80" height="40" rx="4" fill="#FFAF87"/><text class="label" x="294" y="218">yellow</text><text class="hex" x="294" y="242">#FFAF87</text>
  <rect x="380" y="190" width="80" height="40" rx="4" fill="#FBC16A"/><text class="label" x="384" y="218">bryellow</text><text class="hex" x="384" y="242">#FBC16A</text>
  <rect x="470" y="190" width="80" height="40" rx="4" fill="#AFD787"/><text class="label" x="474" y="218">green</text><text class="hex" x="474" y="242">#AFD787</text>
  <rect x="560" y="190" width="80" height="40" rx="4" fill="#34B948"/><text class="label" x="564" y="218">brgreen</text><text class="hex" x="564" y="242">#34B948</text>

  <!-- Row 4: Blues & Purples -->
  <rect x="20"  y="260" width="80" height="40" rx="4" fill="#75d3f4"/><text class="label" x="24" y="288">cyan</text><text class="hex" x="24" y="312">#75d3f4</text>
  <rect x="110" y="260" width="80" height="40" rx="4" fill="#87AFFF"/><text class="label" x="114" y="288">blue</text><text class="hex" x="114" y="312">#87AFFF</text>
  <rect x="200" y="260" width="80" height="40" rx="4" fill="#19B6EE"/><text class="label" x="204" y="288">brblue</text><text class="hex" x="204" y="312">#19B6EE</text>
  <rect x="290" y="260" width="80" height="40" rx="4" fill="#D7AFFF"/><text class="label" x="294" y="288">magenta</text><text class="hex" x="294" y="312">#D7AFFF</text>
  <rect x="380" y="260" width="80" height="40" rx="4" fill="#c590bf"/><text class="label" x="384" y="288">brmag</text><text class="hex" x="384" y="312">#c590bf</text>
</svg>
